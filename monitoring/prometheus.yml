global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Nginx 指标
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-proxy:80']
    metrics_path: /metrics
    
  # Node Exporter (服务器指标)
  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']
    
  # Docker 容器指标
  - job_name: 'docker'
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_nanfeng_blog_env]
        target_label: environment
