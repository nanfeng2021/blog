# ============================================
# 主站点配置（支持金丝雀发布）
# ============================================

server {
    listen 80;
    server_name ainanfeng.cn www.ainanfeng.cn;
    
    # 强制 HTTPS 跳转
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ainanfeng.cn www.ainanfeng.cn;
    
    # SSL 证书配置
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    include /etc/nginx/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/nginx/letsencrypt/ssl-dhparams.pem;
    
    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # 根路径 - 默认生产环境
    location / {
        # 金丝雀发布：10% 流量到灰度环境
        # 通过 Cookie 或 Header 控制
        set $backend "blog_production";
        
        # 如果用户有灰度测试 Cookie，路由到灰度环境
        if ($http_cookie ~* "gray_test=true") {
            set $backend "blog_gray";
        }
        
        # 随机分流（10% 概率到灰度）
        # 使用一致性哈希，确保同一用户始终访问同一环境
        if ($arg_canary = "true") {
            set $backend "blog_gray";
        }
        
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 限流
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;
    }
    
    # 健康检查端点
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
    
    # 静态资源缓存优化
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

# ============================================
# 灰度环境子域名
# ============================================

server {
    listen 80;
    server_name gray.ainanfeng.cn;
    
    # 强制 HTTPS 跳转
    return 301 https://gray.ainanfeng.cn$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gray.ainanfeng.cn;
    
    # SSL 证书（可以使用通配符证书）
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    include /etc/nginx/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/nginx/letsencrypt/ssl-dhparams.pem;
    
    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Robots-Tag "noindex, nofollow" always;  # 禁止搜索引擎索引
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # 灰度环境标识（用于调试）
    add_header X-Environment "gray" always;
    
    # 代理到灰度环境容器
    location / {
        proxy_pass http://blog_gray;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Environment "gray";
        
        # 添加灰度环境标识到页面
        sub_filter '<body>' '<body><div style="position:fixed;top:10px;right:10px;background:#f59e0b;color:white;padding:0.5rem 1rem;border-radius:4px;font-size:0.75rem;z-index:99999;box-shadow:0 2px 8px rgba(0,0,0,0.2);">🧪 灰度测试环境</div>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
    
    # 健康检查
    location /health {
        access_log off;
        return 200 "OK (Gray)\n";
        add_header Content-Type text/plain;
    }
    
    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1h;  # 灰度环境缓存时间短
        add_header Cache-Control "public, no-cache";
    }
}

# ============================================
# 监控面板（可选）
# ============================================

# Grafana
server {
    listen 80;
    server_name monitor.ainanfeng.cn;
    
    location / {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# Prometheus
server {
    listen 80;
    server_name metrics.ainanfeng.cn;
    
    location / {
        proxy_pass http://prometheus:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
