name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # 手动触发
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'gray'
        type: choice
        options:
          - gray
          - production
      version:
        description: '版本号 (可选)'
        required: false
        type: string

env:
  REGISTRY: docker.io
  IMAGE_NAME: nanfeng2021/ainanfeng-blog

jobs:
  # ============================================
  # 1. 构建与测试
  # ============================================
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      git_commit: ${{ steps.vars.outputs.git_commit }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get Git commit
        id: vars
        run: echo "git_commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=,format=short
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event.inputs.version != '' }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITEPRESS_BASE=/
      
      - name: Run tests
        run: |
          echo "Running tests..."
          npm ci
          npm run lint || true  # 暂时允许失败
          # npm test  # TODO: 添加测试
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: docs/.vitepress/dist/
          retention-days: 7

  # ============================================
  # 2. 部署到灰度环境（自动）
  # ============================================
  deploy-gray:
    needs: build
    runs-on: self-hosted  # 需要自托管 Runner
    
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'gray'
    
    environment:
      name: gray
      url: https://gray.ainanfeng.cn
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Gray Environment
        run: |
          echo "🚀 Deploying to GRAY environment..."
          
          # 拉取最新镜像
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.git_commit }}
          
          # 更新灰度环境
          export GIT_COMMIT=${{ needs.build.outputs.git_commit }}
          export VITE_ENV=gray
          docker-compose -f docker-compose.yml up -d blog-gray
          
          # 等待健康检查
          echo "⏳ Waiting for health check..."
          sleep 10
          
          # 验证部署
          if curl -f http://localhost:8081/health; then
            echo "✅ Gray deployment successful!"
          else
            echo "❌ Gray deployment failed!"
            exit 1
          fi
      
      - name: Notify deployment success
        if: success()
        run: |
          echo "::notice::Gray environment deployed successfully"
          echo "URL: https://gray.ainanfeng.cn"
          echo "Commit: ${{ needs.build.outputs.git_commit }}"

  # ============================================
  # 3. 部署到生产环境（需要审批）
  # ============================================
  deploy-production:
    needs: [build, deploy-gray]
    runs-on: self-hosted
    
    if: github.ref == 'refs/heads/main' && github.event.inputs.environment == 'production'
    
    environment:
      name: production
      url: https://ainanfeng.cn
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Wait for approval
        run: |
          echo "⏳ Waiting for production deployment approval..."
          echo "Please review the changes in gray environment first."
          echo "Gray URL: https://gray.ainanfeng.cn"
      
      - name: Deploy to Production
        run: |
          echo "🚀 Deploying to PRODUCTION environment..."
          
          # 备份当前版本
          docker-compose -f docker-compose.yml ps > /tmp/backup-status.txt
          
          # 拉取最新镜像
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.git_commit }}
          
          # 金丝雀发布：先更新灰度环境作为 Canary
          export GIT_COMMIT=${{ needs.build.outputs.git_commit }}
          export VITE_ENV=production
          
          # 更新生产环境
          docker-compose -f docker-compose.yml up -d blog-production
          
          # 等待健康检查
          echo "⏳ Waiting for health check..."
          sleep 15
          
          # 验证部署
          if curl -f http://localhost:8082/health; then
            echo "✅ Production deployment successful!"
          else
            echo "❌ Production deployment failed! Rolling back..."
            # TODO: 实现回滚逻辑
            exit 1
          fi
      
      - name: Update Nginx configuration
        run: |
          echo "🔄 Updating Nginx configuration..."
          docker-compose -f docker-compose.yml restart nginx-proxy
      
      - name: Monitor deployment
        run: |
          echo "📊 Monitoring deployment metrics..."
          # 可以集成 Prometheus/Grafana API
          # 发送通知到 Slack/Discord
      
      - name: Notify deployment success
        if: success()
        run: |
          echo "::notice::Production environment deployed successfully"
          echo "URL: https://ainanfeng.cn"
          echo "Commit: ${{ needs.build.outputs.git_commit }}"
          echo "Gray environment was tested at: https://gray.ainanfeng.cn"

  # ============================================
  # 4. 清理旧镜像
  # ============================================
  cleanup:
    needs: [deploy-production]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Cleanup old Docker images
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'ainanfeng-blog'
          package-type: 'container'
          min-versions-to-keep: 5
          delete-only-untagged-versions: true
